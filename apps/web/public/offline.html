<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookNest - Offline</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto',
          'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans',
          'Helvetica Neue', sans-serif;
        background-color: #ffffff;
        color: #000000;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        text-align: center;
        max-width: 400px;
      }

      .icon {
        font-size: 64px;
        margin-bottom: 20px;
      }

      h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 10px;
      }

      p {
        color: #666;
        margin-bottom: 30px;
        line-height: 1.6;
      }

      .action-buttons {
        display: flex;
        gap: 12px;
        flex-direction: column;
      }

      button {
        padding: 12px 24px;
        font-size: 16px;
        font-weight: 500;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .primary-btn {
        background-color: #2563eb;
        color: white;
      }

      .primary-btn:hover {
        background-color: #1d4ed8;
      }

      .secondary-btn {
        background-color: #f1f5f9;
        color: #000;
        border: 1px solid #e2e8f0;
      }

      .secondary-btn:hover {
        background-color: #e2e8f0;
      }

      .offline-indicator {
        display: inline-block;
        width: 8px;
        height: 8px;
        background-color: #dc2626;
        border-radius: 50%;
        margin-right: 8px;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .status {
        font-size: 14px;
        color: #666;
        margin-top: 40px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="icon">📡</div>

      <h1>You&apos;re Offline</h1>

      <p>
        It looks like you&apos;ve lost your internet connection. Some
        BookNest features may not be available right now.
      </p>

      <div class="action-buttons">
        <button
          class="primary-btn"
          onclick="window.location.reload()"
          aria-label="Retry connection"
        >
          Try Again
        </button>

        <button
          class="secondary-btn"
          onclick="window.history.back()"
          aria-label="Go back"
        >
          Go Back
        </button>
      </div>

      <div class="status">
        <span class="offline-indicator"></span>
        <span>Offline Mode</span>
      </div>
    </div>
  </body>
</html>
